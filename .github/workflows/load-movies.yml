name: Load Movies

on:
  workflow_dispatch:
    # Inputs the workflow accepts.
    inputs:
      days:
        description: 'Days of changes'
        default: "2"
        required: true

jobs:
  load:
    runs-on: ubuntu-latest

    steps:
    - name: Send greeting
      run: echo "Loading ${{ github.event.inputs.days }} days of changes."
